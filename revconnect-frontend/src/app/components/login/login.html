<div class="login-container">
  <div class="login-card">
    <div class="text-center mb-4">
      <h1 class="brand-title">RevConnect</h1>
      <p class="brand-subtitle">Connect. Share. Grow.</p>
    </div>
    
    <form (ngSubmit)="onLogin()">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" [(ngModel)]="loginData.email" name="email" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="password-input-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" class="form-control" [(ngModel)]="loginData.password" name="password" required>
          <span class="password-toggle-text" (click)="togglePasswordVisibility()">
            {{ showPassword ? 'Hide' : 'Show' }}
          </span>
        </div>
      </div>
      
      <div *ngIf="errorMessage" class="alert alert-danger">{{errorMessage}}</div>
      
      <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
      
      <div class="text-center">
        <p>Don't have an account? <a [routerLink]="['/register']" class="text-primary">Register here</a></p>
      </div>
    </form>
  </div>
</div>
