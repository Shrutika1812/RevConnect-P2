<div class="forgot-password-container">
  <div class="forgot-password-card">
    <div class="brand-section">
      <h1 class="brand-title">RevConnect</h1>
      <p class="brand-subtitle">Reset Your Password</p>
    </div>
    
    <div *ngIf="errorMessage" class="alert alert-danger">{{errorMessage}}</div>
    <div *ngIf="successMessage" class="alert alert-success">{{successMessage}}</div>
    
    <!-- Step Indicator -->
    <div class="steps">
      <div class="step" [class.active]="step >= 1" [class.completed]="step > 1">
        <span class="step-number">1</span>
        <span class="step-label">Email</span>
      </div>
      <div class="step-line" [class.completed]="step > 1"></div>
      <div class="step" [class.active]="step >= 2" [class.completed]="step > 2">
        <span class="step-number">2</span>
        <span class="step-label">Security</span>
      </div>
      <div class="step-line" [class.completed]="step > 2"></div>
      <div class="step" [class.active]="step >= 3">
        <span class="step-number">3</span>
        <span class="step-label">Reset</span>
      </div>
    </div>
    
    <!-- Step 1: Email -->
    <form *ngIf="step === 1" (ngSubmit)="submitEmail()" class="form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Continue</button>
      <a [routerLink]="['/login']" class="back-link">Back to Login</a>
    </form>
    
    <!-- Step 2: Security Question -->
    <form *ngIf="step === 2" (ngSubmit)="submitSecurityAnswer()" class="form">
      <div class="form-group">
        <label>Security Question</label>
        <p class="security-question">{{securityQuestion}}</p>
      </div>
      <div class="form-group">
        <label>Your Answer</label>
        <input type="text" class="form-control" [(ngModel)]="securityAnswer" name="securityAnswer" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Verify</button>
      <button type="button" (click)="goBack()" class="btn btn-secondary btn-block">Back</button>
    </form>
    
    <!-- Step 3: New Password -->
    <form *ngIf="step === 3" (ngSubmit)="resetPassword()" class="form">
      <div class="form-group">
        <label>New Password</label>
        <div class="password-input-wrapper">
          <input [type]="showNewPassword ? 'text' : 'password'" class="form-control" [(ngModel)]="newPassword" name="newPassword" required>
          <span class="password-toggle-text" (click)="togglePasswordVisibility('new')">
            {{ showNewPassword ? 'Hide' : 'Show' }}
          </span>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-input-wrapper">
          <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword" required>
          <span class="password-toggle-text" (click)="togglePasswordVisibility('confirm')">
            {{ showConfirmPassword ? 'Hide' : 'Show' }}
          </span>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
      <button type="button" (click)="goBack()" class="btn btn-secondary btn-block">Back</button>
    </form>
  </div>
</div>
